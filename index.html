<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Motion Shield</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        
        /* The Video Feed */
        #video { width: 100vw; height: 100vh; object-fit: cover; }

        /* The Whiteout Overlay */
        #whiteout {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: white;
            display: none; /* Hidden until motion detected */
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        /* The Reset Button (The X) */
        #close-btn {
            position: absolute;
            top: 20px; right: 20px;
            font-size: 40px; font-weight: bold;
            color: #333; cursor: pointer;
            border: 3px solid #333;
            width: 60px; height: 60px;
            display: flex; justify-content: center; align-items: center;
            border-radius: 50%;
        }

        /* Initial Start Overlay */
        #setup-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            color: white;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 2000;
        }

        button {
            padding: 15px 30px; font-size: 18px; cursor: pointer;
            background: #27ae60; color: white; border: none; border-radius: 5px;
        }

        canvas { display: none; }
    </style>
</head>
<body>

    <div id="setup-overlay">
        <h1>Motion Privacy Shield</h1>
        <p>Click the button to enable the camera and motion detection.</p>
        <button onclick="startApp()">Start Shield</button>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="whiteout">
        <div id="close-btn" onclick="resetShield()">X</div>
        <h2 style="color: #666;">SCREEN PROTECTED</h2>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const whiteout = document.getElementById('whiteout');
        const setupOverlay = document.getElementById('setup-overlay');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        let lastFrameData = null;
        let isActive = false;
        let isWhitedOut = false;

        async function startApp() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                setupOverlay.style.display = 'none';
                isActive = true;
                
                // Start the detection loop
                video.onloadedmetadata = () => {
                    video.play();
                    checkMotion();
                };
            } catch (err) {
                alert("Camera access was denied. Please check your browser settings.");
            }
        }

        function checkMotion() {
            if (!isActive || isWhitedOut) return;

            // Use a tiny canvas to compare pixels (faster)
            canvas.width = 64;
            canvas.height = 48;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const currentFrame = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = currentFrame.data;

            if (lastFrameData) {
                let diff = 0;
                for (let i = 0; i < data.length; i += 4) {
                    // Compare brightness of current pixel vs last pixel
                    const oldBrightness = (lastFrameData[i] + lastFrameData[i+1] + lastFrameData[i+2]) / 3;
                    const newBrightness = (data[i] + data[i+1] + data[i+2]) / 3;
                    
                    if (Math.abs(oldBrightness - newBrightness) > 40) {
                        diff++;
                    }
                }

                // If more than 5% of the screen changed, white it out
                if (diff > (canvas.width * canvas.height * 0.05)) {
                    triggerWhiteout();
                }
            }

            lastFrameData = data;
            requestAnimationFrame(checkMotion);
        }

        function triggerWhiteout() {
            isWhitedOut = true;
            whiteout.style.display = 'flex';
        }

        function resetShield() {
            isWhitedOut = false;
            whiteout.style.display = 'none';
            lastFrameData = null; // Clear history to avoid immediate re-trigger
            checkMotion();
        }
    </script>
</body>
</html>
